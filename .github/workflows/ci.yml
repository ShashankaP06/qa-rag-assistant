name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            huggingface-${{ runner.os }}-

      - name: Run unit tests (fast)
        run: pytest -m "not slow and not groq" -v

      - name: Run RAG retrieval evaluation
        run: python -m eval.run_eval

      - name: Run full test suite (with embeddings)
        run: pytest -m "not groq" -v

  # Optional: live Groq generation eval — enable by adding GROQ_API_KEY repo secret
  generation-eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Run generation RAG eval (optional — needs repo secret)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          if [ -n "$GROQ_API_KEY" ]; then
            python -m eval.run_eval --with-llm
          else
            echo "Skipping generation eval — add GROQ_API_KEY to GitHub repo secrets."
          fi
